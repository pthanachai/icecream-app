<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>แอปขายไอติม</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ecfeff, #ffffff, #fdf2f8);
      color: #0f172a;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px;
    }
    .title {
      text-align: center;
      margin-bottom: 8px;
      font-size: 36px;
    }
    .subtitle {
      text-align: center;
      color: #475569;
      margin-bottom: 20px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 18px;
      margin-bottom: 18px;
    }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.06);
    }
    .card h2 {
      margin-top: 0;
      font-size: 22px;
    }
    .stat-label {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 30px;
      font-weight: bold;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }
    .product-btn {
      border: 1px solid #bae6fd;
      background: #f0f9ff;
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      text-align: left;
      font-size: 16px;
      font-weight: bold;
    }
    .product-price {
      display: block;
      color: #0369a1;
      margin-top: 6px;
      font-size: 15px;
    }
    .order-item, .history-item {
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fff;
    }
    .order-name, .history-name {
      font-weight: bold;
      margin-bottom: 6px;
    }
    .muted {
      color: #64748b;
    }
    .small {
      color: #94a3b8;
      font-size: 12px;
      margin-top: 4px;
    }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .mini-btn, .action-btn, .ghost-btn, .danger-btn {
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
    }
    .mini-btn {
      padding: 8px 12px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
    }
    .mini-btn.minus {
      background: #fff1f2;
      border: 1px solid #fecaca;
    }
    .input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 16px;
      margin-top: 8px;
    }
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .action-btn {
      background: #0ea5e9;
      color: white;
      padding: 12px 16px;
      font-weight: bold;
    }
    .ghost-btn {
      background: white;
      color: #0f172a;
      border: 1px solid #cbd5e1;
      padding: 12px 16px;
      font-weight: bold;
      width: 100%;
    }
    .danger-btn {
      background: #fff1f2;
      color: #be123c;
      border: 1px solid #fecaca;
      padding: 10px 14px;
    }
    .money-box {
      margin-top: 12px;
      line-height: 1.8;
      font-size: 18px;
    }
    .money-big {
      font-size: 26px;
      font-weight: bold;
    }
    .warn { color: #dc2626; margin-top: 8px; }
    .empty {
      border: 1px dashed #cbd5e1;
      border-radius: 14px;
      padding: 18px;
      color: #64748b;
      text-align: center;
      background: #fff;
    }
    .history-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    @media (max-width: 640px) {
      .title { font-size: 28px; }
      .stat-value { font-size: 24px; }
      .money-big { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">แอปขายไอติม 🍦</h1>
    <div class="subtitle">กดขาย คิดเงิน ทอนเงิน ปิดบิล แล้วเริ่มลูกค้าคนใหม่ได้ทันที</div>

    <div class="grid-3">
      <div class="card">
        <div class="stat-label">ยอดขายรวม</div>
        <div class="stat-value" id="totalSales">0 บาท</div>
      </div>
      <div class="card">
        <div class="stat-label">จำนวนที่ขาย</div>
        <div class="stat-value" id="totalQty">0 ชิ้น</div>
      </div>
      <div class="card">
        <div class="stat-label">จำนวนบิลที่ปิดแล้ว</div>
        <div class="stat-value" id="billCount">0 บิล</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h2>กดขาย</h2>
        <div class="product-grid" id="products"></div>
      </div>

      <div class="card">
        <h2>บิลลูกค้าปัจจุบัน</h2>
        <div id="order"></div>

        <div class="money-box">
          <div>จำนวนรวม: <strong id="currentQty">0</strong> ชิ้น</div>
          <div>รวมทั้งบิล: <strong id="currentTotal">0</strong> บาท</div>
        </div>

        <input id="cash" class="input" type="number" placeholder="ลูกค้าจ่าย เช่น 100" oninput="renderAll()" />

        <div class="money-box">
          <div>ลูกค้าจ่าย: <strong id="cashShow">0</strong> บาท</div>
          <div class="money-big">เงินทอน: <span id="change">0</span> บาท</div>
          <div id="notEnough" class="warn" style="display:none;">เงินที่ลูกค้าจ่ายยังไม่พอ</div>
        </div>

        <div class="action-grid">
          <button class="action-btn" onclick="confirmPayment()">ตกลง / ปิดบิล</button>
          <button class="ghost-btn" onclick="resetOrder()">ล้างบิลนี้</button>
        </div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h2>เพิ่มสินค้าใหม่</h2>
        <input id="newName" class="input" type="text" placeholder="เช่น ไอติมกะทิ" />
        <input id="newPrice" class="input" type="number" placeholder="ราคา เช่น 20" />
        <div style="margin-top:12px;">
          <button class="ghost-btn" onclick="addProduct()">เพิ่มสินค้า</button>
        </div>
      </div>

      <div class="card">
        <div class="history-top">
          <h2 style="margin:0;">ประวัติที่ขายแล้ว</h2>
        </div>
        <div id="history"></div>
      </div>
    </div>
  </div>

  <script>
    const defaultProducts = [
      { id: 1, name: 'ไอติมโคน รสนม', price: 15 },
      { id: 2, name: 'ไอติมโคน รสสตรอว์เบอร์รี่', price: 15 },
      { id: 3, name: 'ไอติมถ้วยเล็ก รสนม', price: 25 },
      { id: 4, name: 'ไอติมถ้วยเล็ก รสสตรอว์เบอร์รี่', price: 25 },
      { id: 5, name: 'ไอติมถ้วยใหญ่ รสนม', price: 35 },
      { id: 6, name: 'ไอติมถ้วยใหญ่ รสสตรอว์เบอร์รี่', price: 35 },
    ];

    let products = JSON.parse(localStorage.getItem('icecream_products') || 'null') || defaultProducts;
    let currentOrder = JSON.parse(localStorage.getItem('icecream_current_order') || '[]');
    let sales = JSON.parse(localStorage.getItem('icecream_sales') || '[]');

    function saveData() {
      localStorage.setItem('icecream_products', JSON.stringify(products));
      localStorage.setItem('icecream_current_order', JSON.stringify(currentOrder));
      localStorage.setItem('icecream_sales', JSON.stringify(sales));
    }

    function formatNumber(num) {
      return Number(num || 0).toLocaleString('th-TH');
    }

    function renderProducts() {
      const el = document.getElementById('products');
      el.innerHTML = '';
      products.forEach((p) => {
        const btn = document.createElement('button');
        btn.className = 'product-btn';
        btn.innerHTML = `${p.name}<span class="product-price">+${formatNumber(p.price)} บาท</span>`;
        btn.onclick = () => addItem(p);
        el.appendChild(btn);
      });
    }

    function addItem(product) {
      const found = currentOrder.find((item) => item.productId === product.id);
      if (found) {
        found.qty += 1;
        found.total = found.qty * found.price;
      } else {
        currentOrder.push({
          productId: product.id,
          name: product.name,
          price: product.price,
          qty: 1,
          total: product.price,
        });
      }
      saveData();
      renderAll();
    }

    function increaseItem(productId) {
      const item = currentOrder.find((i) => i.productId === productId);
      if (!item) return;
      item.qty += 1;
      item.total = item.qty * item.price;
      saveData();
      renderAll();
    }

    function decreaseItem(productId) {
      const item = currentOrder.find((i) => i.productId === productId);
      if (!item) return;
      item.qty -= 1;
      item.total = item.qty * item.price;
      currentOrder = currentOrder.filter((i) => i.qty > 0);
      saveData();
      renderAll();
    }

    function renderOrder() {
      const el = document.getElementById('order');
      el.innerHTML = '';

      if (currentOrder.length === 0) {
        el.innerHTML = '<div class="empty">ยังไม่มีสินค้าในบิลนี้</div>';
        return;
      }

      currentOrder.forEach((item) => {
        const div = document.createElement('div');
        div.className = 'order-item';
        div.innerHTML = `
          <div class="order-name">${item.name}</div>
          <div class="muted">${formatNumber(item.qty)} ชิ้น = ${formatNumber(item.total)} บาท</div>
          <div class="row">
            <button class="mini-btn" onclick="increaseItem(${item.productId})">+1</button>
            <button class="mini-btn minus" onclick="decreaseItem(${item.productId})">-1</button>
          </div>
        `;
        el.appendChild(div);
      });
    }

    function renderHistory() {
      const el = document.getElementById('history');
      el.innerHTML = '';

      if (sales.length === 0) {
        el.innerHTML = '<div class="empty">ยังไม่มีประวัติการขาย</div>';
        return;
      }

      sales.slice().reverse().forEach((bill) => {
        const div = document.createElement('div');
        div.className = 'history-item';

        const itemsHtml = bill.items.map((item) =>
          `<div class="muted">• ${item.name} x${formatNumber(item.qty)} = ${formatNumber(item.total)} บาท</div>`
        ).join('');

        div.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;">
            <div class="history-name">บิล ${bill.billNo}</div>
            <button class="danger-btn" onclick="deleteBill(${bill.billNo})">ลบบิลนี้</button>
          </div>
          ${itemsHtml}
          <div style="margin-top:8px;"><strong>รวม ${formatNumber(bill.total)} บาท</strong></div>
          <div class="muted">รับเงิน ${formatNumber(bill.cash)} บาท | ทอน ${formatNumber(bill.change)} บาท</div>
          <div class="small">${bill.createdAt}</div>
        `;
        el.appendChild(div);
      });
    }

    function renderSummary() {
      const totalSales = sales.reduce((sum, bill) => sum + bill.total, 0);
      const totalQty = sales.reduce((sum, bill) => sum + bill.items.reduce((a, b) => a + b.qty, 0), 0);
      const billCount = sales.length;

      document.getElementById('totalSales').innerText = `${formatNumber(totalSales)} บาท`;
      document.getElementById('totalQty').innerText = `${formatNumber(totalQty)} ชิ้น`;
      document.getElementById('billCount').innerText = `${formatNumber(billCount)} บิล`;
    }

    function renderMoney() {
      const total = currentOrder.reduce((sum, item) => sum + item.total, 0);
      const qty = currentOrder.reduce((sum, item) => sum + item.qty, 0);
      const cash = Number(document.getElementById('cash').value || 0);
      const change = cash - total;

      document.getElementById('currentQty').innerText = formatNumber(qty);
      document.getElementById('currentTotal').innerText = formatNumber(total);
      document.getElementById('cashShow').innerText = formatNumber(cash);
      document.getElementById('change').innerText = formatNumber(change > 0 ? change : 0);
      document.getElementById('notEnough').style.display = cash > 0 && cash < total ? 'block' : 'none';
    }

    function confirmPayment() {
      if (currentOrder.length === 0) {
        alert('ยังไม่มีสินค้าในบิล');
        return;
      }

      const total = currentOrder.reduce((sum, item) => sum + item.total, 0);
      const cash = Number(document.getElementById('cash').value || 0);

      if (cash < total) {
        alert('เงินที่ลูกค้าจ่ายยังไม่พอ');
        return;
      }

      const nextBillNo = sales.length > 0
        ? Math.max(...sales.map(b => b.billNo || 0)) + 1
        : 1;

      const bill = {
        billNo: nextBillNo,
        items: currentOrder.map((item) => ({ ...item })),
        total,
        cash,
        change: cash - total,
        createdAt: new Date().toLocaleString('th-TH'),
      };

      sales.push(bill);
      currentOrder = [];
      document.getElementById('cash').value = '';
      saveData();
      renderAll();
    }

    function resetOrder() {
      currentOrder = [];
      document.getElementById('cash').value = '';
      saveData();
      renderAll();
    }

    function deleteBill(billNo) {
      if (!confirm('ต้องการลบบิลนี้ใช่ไหม?')) return;
      sales = sales.filter((bill) => bill.billNo !== billNo);
      saveData();
      renderAll();
    }

    function addProduct() {
      const name = document.getElementById('newName').value.trim();
      const price = Number(document.getElementById('newPrice').value || 0);

      if (!name || price <= 0) {
        alert('กรอกชื่อสินค้าและราคาให้ถูกต้อง');
        return;
      }

      products.push({ id: Date.now(), name, price });
      document.getElementById('newName').value = '';
      document.getElementById('newPrice').value = '';
      saveData();
      renderProducts();
    }

    function renderAll() {
      renderProducts();
      renderOrder();
      renderHistory();
      renderSummary();
      renderMoney();
    }

    renderAll();
  </script>
</body>
</html>
