<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WE DRINK POS</title>

<style>
body { font-family: Arial; margin:0; background:#f2f6f9;}
.container { padding:15px; max-width:1000px; margin:auto;}
h2 { margin:10px 0; }

.tabs button {
  padding:8px 15px;
  border:none;
  border-radius:20px;
  margin-right:5px;
  cursor:pointer;
}
.active { background:#2196f3; color:white;}

.product {
  display:inline-block;
  width:45%;
  margin:5px;
  padding:10px;
  background:#e6eef5;
  border-radius:12px;
  cursor:pointer;
}

.cart { background:white; padding:10px; border-radius:10px; margin-top:10px;}

button { padding:10px; margin:5px; border:none; border-radius:10px; cursor:pointer;}
</style>

</head>

<body>
<div class="container">

<h2>กดขาย</h2>

<div class="tabs">
  <button onclick="setCategory('ไอศกรีม')" id="tab-ไอศกรีม">ไอศกรีม</button>
  <button onclick="setCategory('น้ำ')" id="tab-น้ำ">น้ำ</button>
</div>

<div id="products"></div>

<h2>รายการ</h2>
<div id="cart" class="cart"></div>

<h3>รวม: <span id="total">0</span> บาท</h3>

<h3>รับเงิน</h3>
<input type="number" id="cash" placeholder="รับเงิน">
<p>เงินทอน: <span id="change">0</span></p>

<h3>วิธีจ่าย</h3>
<select id="payment">
  <option>เงินสด</option>
  <option>โอน</option>
  <option>QR</option>
</select>

<br>
<button onclick="checkout(false)">ปิดบิล</button>
<button onclick="checkout(true)">ปิดบิล + พิมพ์</button>

</div>

<script>

// 🔥 ใส่ลิงก์ของแบมตรงนี้
const API_URL = "https://script.google.com/macros/s/AKfycbw0Z4ozuLtUPm_GvDw2yOVww0tOrEzslYeRpY6Q-1aWKB7g61yBJLGFKNonnqbsP5OKqw/exec";

let products = [
  { name: "ไอติมโคน รสนม", price: 20, category: "ไอศกรีม" },
  { name: "ไอติมโคนมัทฉะ", price: 20, category: "ไอศกรีม" },
  { name: "ไอติมมัทฉะถั่วเเดง แก้วเล็ก", price: 35, category: "ไอศกรีม" },
  { name: "ไอติมมัทฉะถั่วเเดง แก้วใหญ่", price: 45, category: "ไอศกรีม" },
  { name: "ไอติมโอริโอ้ แก้วเล็ก", price: 35, category: "ไอศกรีม" },
  { name: "ไอติมโอริโอ้ แก้วใหญ่", price: 45, category: "ไอศกรีม" },
  { name: "ไอติมมะม่วงแก้วเล็ก", price: 35, category: "ไอศกรีม" },
  { name: "ไอติมมะม่วงแก้วใหญ่", price: 45, category: "ไอศกรีม" },
  { name: "ไอติมบลูเบอรรี่แก้วเล็ก", price: 35, category: "ไอศกรีม" },
  { name: "ไอติมบลูเบอรรี่แก้วใหญ่", price: 45, category: "ไอศกรีม" },
  { name: "ไอติมสตอเบอรรี่แก้วเล็ก", price: 35, category: "ไอศกรีม" },
  { name: "ไอติมสตอเบอรรี่แก้วใหญ่", price: 45, category: "ไอศกรีม" },
  { name: "ไอติมช็อคโกเเลตแก้วเล็ก", price: 35, category: "ไอศกรีม" },
  { name: "ไอติมช็อคโกเเลตแก้วใหญ่", price: 45, category: "ไอศกรีม" },
  
  
  { name: "มะนาว", price: 30, category: "น้ำ" },
  { name: "เสาวรส", price: 30, category: "น้ำ" },
  { name: "เชอรี่", price: 45, category: "น้ำ" },
  { name: "ชาองุ่น 6 ลูก", price: 45, category: "น้ำ" },
  { name: "ชาองุ่น 6 ลูกครีมชีส", price: 60, category: "น้ำ" },
  { name: "น้ำส้ม", price: 30, category: "น้ำ" },
  { name: "ชามะนาวองุ่น", price: 35, category: "น้ำ" },
  { name: "ชาบลูเบอรรี่", price: 40, category: "น้ำ" },
];

let currentCategory = "ไอศกรีม";
let cart = [];

function setCategory(cat){
  currentCategory = cat;
  renderProducts();
}

function renderProducts(){
  let html="";
  products.filter(p=>p.category===currentCategory).forEach(p=>{
    html+=`
      <div class="product" onclick="add('${p.name}',${p.price})">
        ${p.name}<br>+${p.price} บาท
      </div>`;
  });
  document.getElementById("products").innerHTML = html;
}

function add(name,price){
  cart.push({name,price});
  renderCart();
}

function renderCart(){
  let html="";
  let total=0;

  cart.forEach((i,index)=>{
    html+=`${i.name} ${i.price} บาท 
    <button onclick="removeItem(${index})">ลบ</button><br>`;
    total+=i.price;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = total;

  let cash = Number(document.getElementById("cash").value||0);
  document.getElementById("change").innerText = cash-total;
}

function removeItem(i){
  cart.splice(i,1);
  renderCart();
}

document.getElementById("cash").addEventListener("input",renderCart);

function checkout(print){
  if(cart.length==0) return alert("ไม่มีรายการ");

  let total = cart.reduce((a,b)=>a+b.price,0);
  let items = cart.map(i=>i.name).join(",");
  let payment = document.getElementById("payment").value;

  // 🔥 ส่งเข้า Google Sheet
  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      items: items,
      total: total,
      payment: payment
    }),
    headers: {
      "Content-Type": "application/json"
    }
  });

  if(print) window.print();

  alert("บันทึกแล้ว");
  cart=[];
  document.getElementById("cash").value="";
  renderCart();
}

renderProducts();

</script>

</body>
</html>
